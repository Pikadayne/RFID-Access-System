<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - RFID Access Control</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1>🔐 RFID KIỂM SOÁT NHÂN VIÊN RA VÀO</h1>
            <div class="nav-links">
                <a href="/">ĐIỂM DANH</a>
                <a href="/users.html" class="active">NHÂN VIÊN</a>
                <a href="/logs.html">LOGS</a>
                <a href="/reports.html">BÁO CÁO</a>
            </div>
        </div>
    </nav>

    <div class="container main-content">
        <div class="card">
            <div class="card-header">
                <h2>Quản lí nhân viên</h2>
                <button class="btn btn-primary" onclick="showCreateForm()">+ Thêm nhân viên</button>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Tìm kiếm tên hoặc mã nhân viên" onkeyup="filterTable()">
            </div>

            <table id="usersTable" class="data-table">
                <thead>
                    <tr>
                        <th>UID</th>
                        <th>Tên nhân viên</th>
                        <th>Email</th>
                        <th>Vai trò</th>
                        <th>Phòng ban</th>
                        <th>Trạng thái</th>
                        <th>Chỉnh sửa</th>
                    </tr>
                </thead>
                <tbody id="usersBody">
                    <tr><td colspan="7" class="text-center">Loading...</td></tr>
                </tbody>
            </table>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- Modal for Create/Edit User -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle">Add User</h3>
            <form id="userForm">
                <div class="form-group">
                    <label>UID:</label>
                    <input type="text" id="formUID" placeholder="e.g., A1B2C3D4" required>
                </div>
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" id="formFullName" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="formEmail">
                </div>
                <div class="form-group">
                    <label>Phone:</label>
                    <input type="text" id="formPhone">
                </div>
                <div class="form-group">
                    <label>Role:</label>
                    <select id="formRole">
                        <option value="Employee">Employee</option>
                        <option value="Visitor">Visitor</option>
                        <option value="Contractor">Contractor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Department:</label>
                    <input type="text" id="formDepartment">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        let currentPage = 1;
        const pageSize = 20;
        let allUsers = [];

        // Load users on page load
        window.addEventListener('load', () => loadUsers());

        async function loadUsers() {
            try {
                const response = await apiCall('GET', `/api/users?page=${currentPage}&pageSize=${pageSize}`);
                allUsers = response.data || [];
                displayUsers();
                displayPagination(response.pagination);
            } catch (error) {
                alert(`Error loading users: ${error.message}`);
            }
        }

        function displayUsers() {
            const tbody = document.getElementById('usersBody');
            if (allUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No users found</td></tr>';
                return;
            }

            tbody.innerHTML = allUsers.map(user => `
                <tr>
                    <td>${user.uid}</td>
                    <td>${user.fullName}</td>
                    <td>${user.email || '-'}</td>
                    <td>${user.role}</td>
                    <td>${user.department || '-'}</td>
                    <td><span class="badge ${user.isActive ? 'badge-active' : 'badge-inactive'}">${user.isActive ? 'Active' : 'Inactive'}</span></td>
                    <td>
                        <button class="btn btn-small" onclick="editUser(${user.userId})">Sửa</button>
                        <button class="btn btn-small btn-danger" onclick="deleteUser(${user.userId})">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        function displayPagination(pagination) {
            const pag = document.getElementById('pagination');
            if (pagination.totalPages <= 1) {
                pag.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 1; i <= pagination.totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            pag.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            loadUsers();
        }

        function filterTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = allUsers.filter(user =>
                user.uid.toLowerCase().includes(search) ||
                user.fullName.toLowerCase().includes(search)
            ).map(user => `
                <tr>
                    <td>${user.uid}</td>
                    <td>${user.fullName}</td>
                    <td>${user.email || '-'}</td>
                    <td>${user.role}</td>
                    <td>${user.department || '-'}</td>
                    <td><span class="badge ${user.isActive ? 'badge-active' : 'badge-inactive'}">${user.isActive ? 'Active' : 'Inactive'}</span></td>
                    <td>
                        <button class="btn btn-small" onclick="editUser(${user.userId})">Edit</button>
                        <button class="btn btn-small btn-danger" onclick="deleteUser(${user.userId})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function showCreateForm() {
            document.getElementById('modalTitle').textContent = 'Add User';
            document.getElementById('userForm').reset();
            document.getElementById('userForm').onsubmit = createUser;
            document.getElementById('userModal').style.display = 'block';
        }

        function editUser(userId) {
            alert('Edit feature - coming soon');
        }

        async function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                try {
                    await apiCall('DELETE', `/api/users/${userId}`);
                    loadUsers();
                } catch (error) {
                    alert(`Error deleting user: ${error.message}`);
                }
            }
        }

        async function createUser(e) {
            e.preventDefault();
            try {
                await apiCall('POST', '/api/users', {
                    uid: document.getElementById('formUID').value,
                    fullName: document.getElementById('formFullName').value,
                    email: document.getElementById('formEmail').value,
                    phoneNumber: document.getElementById('formPhone').value,
                    role: document.getElementById('formRole').value,
                    department: document.getElementById('formDepartment').value
                });
                closeModal();
                loadUsers();
            } catch (error) {
                alert(`Error creating user: ${error.message}`);
            }
        }

        function closeModal() {
            document.getElementById('userModal').style.display = 'none';
        }
    </script>
</body>
</html>
